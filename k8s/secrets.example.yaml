apiVersion: v1
kind: Secret
metadata:
  name: erapport-secret
  namespace: erapport
type: Opaque
stringData:
  DATABASE_URL: mysql://erapport:change-me-app-password@mariadb:3306/erapport
  KEYCLOAK_URL: https://sso.example.com
  KEYCLOAK_REALM: education
  KEYCLOAK_CLIENT_ID: erapport
  KEYCLOAK_CLIENT_SECRET: change-me-client-secret
  SESSION_SECRET: change-me-session-secret
---
apiVersion: v1
kind: Secret
metadata:
  name: mariadb-secret
  namespace: erapport
type: Opaque
stringData:
  MARIADB_PASSWORD: change-me-app-password
  MARIADB_ROOT_PASSWORD: change-me-root-password
